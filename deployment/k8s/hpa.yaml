apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credit-score-api-hpa
  namespace: credit-score
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credit-score-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
