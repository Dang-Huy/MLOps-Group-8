apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-score-api
  namespace: credit-score
  labels:
    app: credit-score-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credit-score-api
  template:
    metadata:
      labels:
        app: credit-score-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      # --- CHIẾN THUẬT LÁCH LUẬT: DÙNG INIT CONTAINER ---
      initContainers:
      - name: model-provider
        image: ruoc188/ml-models:latest # Image chứa file .pkl của bạn
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "cp /models/serving_model_bundle.pkl /shared-model/"]
        volumeMounts:
        - name: model-shared-storage
          mountPath: /shared-model/

      containers:
        - name: api
          image: ruoc188/mlops-group8:v1.0 # Image API cũ, không cần sửa
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            # 1. Biến môi trường để kích hoạt logic load model tại chỗ
            - name: USE_BAKED_MODEL
              value: "true"
            - name: MODEL_PATH_BAKED
              value: "/app/models/serving_model_bundle.pkl"

            # 2. Giữ các biến MLflow cũ để dự phòng/khi chạy local
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: credit-score-config
                  key: mlflow_tracking_uri
            - name: MLFLOW_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: credit-score-config
                  key: mlflow_model_name
            - name: MLFLOW_MODEL_ALIAS
              valueFrom:
                configMapKeyRef:
                  name: credit-score-config
                  key: MLFLOW_MODEL_ALIAS
            - name: MLFLOW_EXPERIMENT_NAME
              valueFrom:
                configMapKeyRef:
                  name: credit-score-config
                  key: MLFLOW_EXPERIMENT_NAME
          
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          
          volumeMounts:
            # Vùng đệm chứa model lấy từ InitContainer
            - name: model-shared-storage
              mountPath: /app/models
            # PVC cũ của bạn (vẫn giữ nếu bạn cần dùng cho mục đích khác)
            - name: artifacts
              mountPath: /app/artifacts
              readOnly: true
      
      volumes:
        # Khai báo vùng đệm chia sẻ trong bộ nhớ Pod
        - name: model-shared-storage
          emptyDir: {}
        # PVC artifacts hiện có
        - name: artifacts
          persistentVolumeClaim:
            claimName: credit-score-artifacts-pvc