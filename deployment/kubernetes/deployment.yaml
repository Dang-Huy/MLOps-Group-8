apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-score-api
  labels:
    app: credit-score-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credit-score-api
  template:
    metadata:
      labels:
        app: credit-score-api
    spec:
      containers:
      - name: api
        image: credit-score-mlops:latest
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: /app/artifacts/models/final_model_bundle.pkl
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: credit-score-api-svc
spec:
  selector:
    app: credit-score-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
