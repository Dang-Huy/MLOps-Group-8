training:
  seed: 42
  cv_folds: 5
  metric: f1_macro
  use_class_weights: true

models:
  logistic_regression:
    max_iter: 1000
    C: 1.0
    solver: lbfgs
    multi_class: multinomial
    random_state: 42
    n_jobs: -1

  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5
    random_state: 42
    n_jobs: -1
    class_weight: balanced

  extra_trees:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5
    random_state: 42
    n_jobs: -1
    class_weight: balanced

  xgboost:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    objective: multi:softprob
    eval_metric: mlogloss
    random_state: 42
    n_jobs: -1
    verbosity: 0

  lightgbm:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    objective: multiclass
    num_class: 3
    random_state: 42
    n_jobs: -1
    verbose: -1

tuning:
  n_trials: 30
  timeout: 300
  metric: f1_macro

ensemble:
  method: soft_voting
  models: [xgboost, lightgbm, random_forest]
