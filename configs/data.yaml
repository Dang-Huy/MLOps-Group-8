data:
  # Only train_raw.csv is used — split into 70/15/15 internally
  train_path: data/raw/train_raw.csv
  target_column: Credit_Score
  id_columns: [ID, Customer_ID, Name, SSN, Month]
  drop_columns: [Type_of_Loan]

split:
  strategy: stratified
  source: train_only          # split from train_raw.csv only
  train_size: 0.70
  valid_size: 0.15
  test_size:  0.15
  random_state: 42

schema:
  target_classes: [Poor, Standard, Good]
  target_encoding:
    Poor: 0
    Standard: 1
    Good: 2
  numeric_columns:
    - Age
    - Annual_Income
    - Monthly_Inhand_Salary
    - Num_Bank_Accounts
    - Num_Credit_Card
    - Interest_Rate
    - Num_of_Loan
    - Delay_from_due_date
    - Num_of_Delayed_Payment
    - Changed_Credit_Limit
    - Num_Credit_Inquiries
    - Outstanding_Debt
    - Credit_Utilization_Ratio
    - Credit_History_Age
    - Total_EMI_per_month
    - Amount_invested_monthly
    - Monthly_Balance
  categorical_columns:
    - Occupation
    - Credit_Mix
    - Payment_of_Min_Amount
    - Payment_Behaviour
